name: LoanFlow CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  MAVEN_OPTS: "-Xmx1024m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"

jobs:

  build-test-sonar:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repository
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Install Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      # 3️⃣ Verify environment
      - name: Verify Java + Maven
        run: |
          java --version
          mvn --version

      # 4️⃣ Build + Test + Coverage
      - name: Build and Run Tests
        run: |
          mvn clean verify \
          --no-transfer-progress

      # 5️⃣ SonarCloud analysis
      - name: SonarCloud Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=loanflow \
            -Dsonar.organization=${{ vars.SONAR_ORG }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            --no-transfer-progress
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 6️⃣ Upload test reports
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            target/surefire-reports
            target/site/jacoco
          retention-days: 14

      # 7️⃣ Upload built JAR
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: loanflow-jar-${{ github.run_number }}
          path: target/*.jar
          retention-days: 30

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: build-test-sonar
    if: always()

    steps:
      - name: Write Summary
        run: |
          echo "## LoanFlow CI Pipeline #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build + Test + Sonar | ${{ needs.build-test-sonar.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY